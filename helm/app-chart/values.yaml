global:
  environment: dev

app:
  name: app
  component: backend

replicaCount: 2

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

container:
  port: 8080

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  SERVER_PORT: "8080"
  JAVA_OPTS: "-Dserver.port=8080"
  JAVA_OPTS: "-Djava.io.tmpdir=/tmp"

configMap:
  enabled: true
  data:
    LOG_LEVEL: INFO

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  enabled: true
  readiness:
    path: /actuator/health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /actuator/health
    initialDelaySeconds: 90
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

startupProbe:
  enabled: true
  httpGet:
    path: /actuator/health
    port: 8080
  failureThreshold: 30
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: false

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
terminationGracePeriodSeconds: 60
revisionHistoryLimit: 5

volumeMounts:
  - name: tmp
    mountPath: /tmp

volumes:
  - name: tmp
    emptyDir: {}
