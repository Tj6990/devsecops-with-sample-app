name: DevSecOps Pipeline

on:
  push:
    branches: [develop]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: project-7bb6fee9-e074-47fb-bf6
  REGION: us-central1
  ARTIFACT_REGISTRY_REPO: my-ar-repo
  IMAGE_NAME: app
  CLUSTER: my-cluster
  NAMESPACE: default

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ GCP Auth using Workload Identity Federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/340263268846/locations/global/workloadIdentityPools/github-pool/attribute.repository/github-provider"
          service_account: "my-cicd@project-7bb6fee9-e074-47fb-bf6.iam.gserviceaccount.com"

      # ✅ Setup gcloud
      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2

      # ✅ Configure Docker for Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # ✅ Build image
      - name: Build Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$IMAGE_NAME:$GITHUB_SHA .

      # ✅ Push image
      - name: Push Image
        run: |
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$IMAGE_NAME:$GITHUB_SHA

      # ✅ Get GKE credentials
      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials $CLUSTER --region $REGION --project $PROJECT_ID

      # ✅ Deploy via Helm
      - name: Deploy via Helm
        run: |
          helm upgrade --install app ./helm \
            --namespace $NAMESPACE --create-namespace \
            --set image.repository=us-central1-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$IMAGE_NAME \
            --set image.tag=$GITHUB_SHA
