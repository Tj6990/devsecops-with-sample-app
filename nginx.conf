server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # ✅ Global headers ONLY (no duplication anywhere else)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Cache-Control "public, max-age=0" always;

    # ✅ Health endpoint (NO add_header here)
    location /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    # ✅ SPA routing
    location / {
        try_files $uri /index.html;
    }

    # ✅ Static assets caching (NO add_header!)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
    }
}