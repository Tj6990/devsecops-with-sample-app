global:
  environment: dev

replicaCount: 1

env:
  SPRING_PROFILES_ACTIVE: dev
  SERVER_PORT: "8080"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

pdb:
  enabled: true
  minAvailable: 1

ingress:
  enabled: false

networkPolicy:
  enabled: false
